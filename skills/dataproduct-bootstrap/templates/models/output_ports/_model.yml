version: 2

models:
  - name: {{TABLE}}
    description: {{PURPOSE}}
    config:
      meta:
        data_contract:
          id: {{CONTRACT_ID}}
          file: datacontracts/{{CONTRACT_FILE}}
        owner: {{TEAM_NAME}}
      materialized: table
      contract:
        enforced: true
    columns:
      - name: ID
        description: Primary key.
        data_type: varchar
        constraints:
          - type: not_null
          - type: unique
      - name: UPDATED_AT
        description: Timestamp when this record was written by dbt.
        data_type: timestamp_ntz
        constraints:
          - type: not_null
